<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Breach</title>
<style>
  body {
    margin: 0;
    font-family: monospace;
    overflow: hidden;
    background-color: #330000; /* dark red */
    color: #FF3333;
  }

  .data-line {
    position: absolute;
    font-size: 12px;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .miniProgressContainer {
    width: 60%;
    height: 25px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    margin: 15px auto;
    overflow: hidden;
    position: relative;
  }

  .miniProgressBar {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 12px;
    transition: width 0.05s linear;
  }

  .task-label {
    text-align: center;
    color: #fff;
    margin: 5px auto;
    font-size: 14px;
  }

  .scare-image {
    position: absolute;
    display: none;
    border-radius: 12px;
    box-shadow: 0 0 20px black;
  }

  #finalScreen {
    display: none;
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: black;
    color: white;
    overflow: hidden;
  }

  .april-text {
    position: absolute;
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

<!-- Scare images -->
<img id="img1" class="scare-image" src="img1.jpg">
<img id="img2" class="scare-image" src="img2.jpg">
<img id="img3" class="scare-image" src="img3.jpg">
<img id="img4" class="scare-image" src="img4.jpg">

<div id="finalScreen"></div>

<script>
// --- SETTINGS ---
const hints = [
  "Krenzen Auto found suspicious activity",
  "Duluth dealership server hit",
  "Check Vin# 12345",
  "Dealership profits at risk",
  "Hidden files in inventory.csv",
  "Customer database anomaly detected"
];

const scareImages = [
  document.getElementById('img1'),
  document.getElementById('img2'),
  document.getElementById('img3'),
  document.getElementById('img4')
];

// --- DATA COMPILATION SCATTERED ---
function randomPosition() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight
  };
}

function generateDataLine() {
  const content = hints[Math.floor(Math.random()*hints.length)] +
    ` | load: ${Math.floor(Math.random()*100)}% | code: ${Math.floor(Math.random()*100000)}`;
  return content;
}

let dataLinesCount = 0;
let maxDataLines = 200; // how many lines to show before moving on

function runDataCompilation() {
  const interval = setInterval(() => {
    const line = document.createElement('div');
    line.className = 'data-line';
    line.textContent = generateDataLine();

    const pos = randomPosition();
    line.style.left = pos.x + 'px';
    line.style.top = pos.y + 'px';
    line.style.fontSize = (12 + Math.random()*10) + 'px';

    document.body.appendChild(line);

    dataLinesCount++;
    if(dataLinesCount > maxDataLines) {
      clearInterval(interval);
      setTimeout(runMiniProgressBars, 500);
    }
  }, 20); // very fast for 10x speed
}

// --- MINI PROGRESS BARS + IMAGES ---
const tasks = [
  "Encrypting files",
  "Uploading logs",
  "Scanning network",
  "Compiling system data",
  "Decrypting secure keys",
  "Simulating AI response"
];

function runMiniProgressBars() {
  let i = 0;

  function nextTask() {
    if(i >= tasks.length) {
      setTimeout(showAprilFoolsScreen, 500);
      return;
    }

    // Randomly position scare image
    const img = scareImages[i];
    if(img){
      img.style.display = 'block';
      img.style.width = (200 + Math.random()*200) + 'px';
      img.style.top = Math.random() * (window.innerHeight - 300) + 'px';
      img.style.left = Math.random() * (window.innerWidth - 300) + 'px';
    }

    // create progress bar
    const container = document.createElement('div');
    container.className = 'miniProgressContainer';
    const bar = document.createElement('div');
    bar.className = 'miniProgressBar';
    container.appendChild(bar);
    document.body.appendChild(container);

    const label = document.createElement('div');
    label.className = 'task-label';
    label.textContent = tasks[i];
    document.body.appendChild(label);

    let pct = 0;
    const fill = setInterval(() => {
      pct += Math.random()*30;
      if(pct>=100) pct=100;
      bar.style.width = pct + '%';

      if(pct>=100){
        clearInterval(fill);
        setTimeout(()=>{
          container.remove();
          label.remove();
          if(img) img.style.display = 'none';
          i++;
          nextTask();
        }, 500);
      }
    },50);
  }

  nextTask();
}

// --- FINAL APRIL FOOLS SCREEN ---
function showAprilFoolsScreen() {
  const screen = document.getElementById('finalScreen');
  screen.style.display = 'block';

  const fonts = ["Arial","Impact","Comic Sans MS","Courier New","Georgia","Verdana"];
  const colors = ["#FF0000","#00FF00","#FFFF00","#FF00FF","#00FFFF","#FFFFFF"];

  function createText() {
    const t = document.createElement('div');
    t.className = 'april-text';
    t.textContent = "APRIL FOOLS!";
    t.style.fontSize = (20 + Math.random()*50) + "px";
    t.style.color = colors[Math.floor(Math.random()*colors.length)];
    t.style.fontFamily = fonts[Math.floor(Math.random()*fonts.length)];
    t.style.left = Math.random()*window.innerWidth + 'px';
    t.style.top = Math.random()*window.innerHeight + 'px';
    screen.appendChild(t);

    let top = parseFloat(t.style.top);
    setInterval(()=>{
      top += 1 + Math.random()*3;
      if(top > window.innerHeight) top = -50;
      t.style.top = top + 'px';
    },50);
  }

  for(let i=0;i<50;i++){
    setTimeout(createText,i*100);
  }
}

// --- START ---
runDataCompilation();
</script>

</body>
</html>
